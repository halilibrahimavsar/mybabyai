app:
  debug: false
  language: tr
  name: MyBabyAI-Turbo
  version: 1.0.0

model:
  default_model: CodeMind-650M
  device: cuda
  load_in_4bit: false
  attn_implementation: flash_attention_2
  lora:
    r: 32
    lora_alpha: 64
    lora_dropout: 0.05
    target_modules:
      - q_proj
      - v_proj
      - k_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
  max_memory: 80GB

training:
  per_device_train_batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  max_length: 4096
  gradient_checkpointing: true
  num_train_epochs: 5
  optim: adamw_torch_fused
  output_dir: models/turbo_train
  logging_steps: 5
  save_steps: 200
  warmup_steps: 200
  pack_sequences: true
  torch_compile: true
  bf16: true
  tf32: true
  dataloader_num_workers: 8
  dataloader_pin_memory: true
